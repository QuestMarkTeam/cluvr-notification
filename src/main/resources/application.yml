# Notification 서버 설정
server:
  error:
    include-message: always
  port: 8082
spring:
  application:
    name: cluvr

  datasource:
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8

  rabbitmq:
    host: ${RMQ_HOST}
    port: ${RMQ_PORT}
    username: ${RMQ_USERNAME}
    password: ${RMQ_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        use_sql_comments: true
        dialect: org.hibernate.dialect.MySQLDialect
        highlight_sql: true
  data:
    mongodb:
      host: localhost
      port: 27017
      database: cluvr

jwt:
  secret:
    key:
  expirationMs: 3600000

# Cognito 설정
cognito:
  jwkSetUri: ${COGNITO_JWK_SET_URI}

# AWS 설정
cloud:
  aws:
    region:
      static: ${AWS_REGION}
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}

# 로깅 설정
logging:
  level:
    root: info
    com.example: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
api:
  server:
    base-url : http://localhost:8080
