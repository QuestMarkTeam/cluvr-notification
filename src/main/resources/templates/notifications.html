<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <title>📬 내 알림</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
<h1>🔔 내 알림</h1>
<button onclick="logout()">로그아웃</button>
<div id="notifications"></div>

<script>
    const token = localStorage.getItem("accessToken");
    if (!token) {
        alert("로그인이 필요합니다.");
        window.location.href = "login.html";
    }

    const headers = { "Authorization": "Bearer " + token };

    async function fetchNotifications() {
        const res = await fetch("/notifications", { headers });
        const data = await res.json();
        data.forEach(noti => renderNotification(noti));
    }

    function renderNotification(noti, isNew = false) {
        const div = document.createElement("div");
        div.className = "notification" + (noti.isRead ? "" : " unread");
        div.innerHTML = `
        <div>${noti.content}</div>
        <div class="timestamp">${new Date(noti.createdAt).toLocaleString()}</div>
      `;

        div.onclick = async () => {
            if (!noti.isRead) {
                await fetch(`/notifications/${noti.id}/read`, {
                    method: "PATCH",
                    headers,
                });
                div.classList.remove("unread");
                noti.isRead = true;
            }

            if (noti.targetType === "BOARD") {
                window.location.href = `/boards/${noti.targetId}`;
            }
        };

        const container = document.getElementById("notifications");
        isNew ? container.prepend(div) : container.appendChild(div);
    }

    function connectSSE() {
        const sse = new EventSource("/notifications/connect"); // 헤더 못 붙이지만 백엔드에서 SecurityContext 사용 중
        sse.onmessage = e => {
            const noti = JSON.parse(e.data);
            renderNotification(noti, true);
        };
        sse.onerror = e => {
            console.warn("SSE 재연결 시도 중...");
            sse.close();
            setTimeout(connectSSE, 5000);
        };
    }

    function logout() {
        localStorage.clear();
        window.location.href = "login.html";
    }

    fetchNotifications();
    connectSSE();
</script>
</body>
</html>
